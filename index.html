<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTO-PRO | Kurumsal Lojistik Yönetim Merkezi</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
.glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 3px solid #FFD700; }
.status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
</style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

<div class="bg-black text-white text-[9px] font-black text-center py-2 uppercase tracking-widest sticky top-0 z-[5000] flex justify-between px-6">
<span><span class="status-dot mr-1"></span> GÜVENLİ TAŞIMACILIK PROTOKOLÜ AKTİF</span>
<span class="text-yellow-400 italic"><i class="fa-solid fa-motorcycle mr-1"></i> 610 KURYE ÇEVRİMİÇİ</span>
</div>

<nav class="glass-nav p-4 sticky top-4 z-[4500] mx-4 rounded-2xl shadow-lg flex justify-between items-center">
<div class="text-2xl font-black italic tracking-tighter text-black">MOTO<span class="text-yellow-500">-PRO</span></div>
<div class="flex gap-4">
<a href="#" class="text-[9px] font-black uppercase italic text-black border-b-2 border-yellow-400">Ana Sayfa</a>
<a href="#" class="text-[9px] font-black uppercase italic text-red-600">Yasal Uyarı</a>
</div>
</nav>

<section class="py-10 px-4 max-w-xl mx-auto">
<div class="bg-white p-8 rounded-[3rem] shadow-2xl border-t-8 border-yellow-400 relative">
<h2 class="text-xl font-black text-center mb-6 italic uppercase text-slate-500">DİJİTAL <span class="text-orange-600">OPERASYON MERKEZİ</span></h2>

<div class="space-y-4 text-center">
<select class="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none text-slate-500 text-sm">
<option disabled selected>Şehir Seçin</option>
<option>İstanbul</option>
</select>

<div class="bg-slate-900 p-8 rounded-[2.5rem] text-center border-b-4 border-yellow-500 shadow-inner">
<p class="text-5xl font-black text-white italic tracking-tighter">0.00 TL</p>
<p class="text-[8px] text-yellow-400 font-bold uppercase mt-2 italic">TAHSİLAT BEKLENİYOR...</p>
</div>

<button class="w-full bg-black text-white py-5 rounded-2xl font-black text-[10px] uppercase italic tracking-widest flex items-center justify-center gap-2">
<i class="fa-solid fa-lock text-yellow-400"></i> OPERASYON RAPORU (SADECE PATRON)
</button>

<button class="w-full bg-yellow-400 text-black py-5 rounded-2xl font-black text-[10px] uppercase italic tracking-widest">
<i class="fa-solid fa-warning"></i> SAHA EKİBİNE İŞ EMRİ GÖNDER
</button>

<div class="grid grid-cols-2 gap-3 mt-4">
<button class="bg-blue-600 text-white py-4 rounded-xl font-black text-[9px] uppercase italic shadow-lg shadow-blue-200">
<i class="fa-solid fa-box mr-1"></i> PAKET TESLİM ALINDI
</button>
<button class="bg-green-600 text-white py-4 rounded-xl font-black text-[9px] uppercase italic shadow-lg shadow-green-200">
<i class="fa-solid fa-check-double mr-1"></i> PAKET TESLİM EDİLDİ
</button>
</div>
</div>
</div>
</section>

<div class="fixed bottom-6 right-6 z-[6000]">
<button class="bg-yellow-400 w-16 h-16 rounded-full shadow-2xl flex items-center justify-center border-4 border-slate-900">
<i class="fa-solid fa-user-plus text-2xl text-slate-900"></i>
</button>
</div>
